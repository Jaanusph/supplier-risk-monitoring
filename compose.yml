services:
  postgres:
    image: postgres:16
    container_name: supplier_risk_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  pipeline:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: supplier_risk_pipeline
    env_file:
      - .env
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy

  dbt:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: supplier_risk_dbt
    env_file:
      - .env
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
    working_dir: /app

  dashboard:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: supplier_risk_dashboard
    env_file:
      - .env
    volumes:
      - .:/app
    ports:
      - "8501:8501"
    depends_on:
      postgres:
        condition: service_healthy
    command: streamlit run dashboard/app.py --server.address=0.0.0.0 --server.port=8501

volumes:
  postgres_data:
